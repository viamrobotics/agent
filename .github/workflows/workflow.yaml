name: Test and Build

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  release:
    types: [created]

permissions:
  contents: read

jobs:
  test:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    # Skip rerun on unrelated label changes; still run when dev-release is
    # added so the build job has a fresh test pass before uploading artifacts.
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
      (github.event.action == 'labeled' && github.event.label.name == 'dev-release')
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required to be able to generate prerelease tags
    - name: Install toolchain
      uses: jdx/mise-action@146a28175021df8ca24f8ee1828cc2a60f980bd5
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Lint
      run: |
        make lint
        GEN_DIFF=$(git status -s)
        if [ -n "$GEN_DIFF" ]; then
            echo '"make lint" resulted in the following untracked changes:' 1>&2
            git diff
            echo '"make lint" resulted in changes not in git' 1>&2
            git status
            exit 1
        fi
    - name: Shell script formatting
      run: shfmt -d *.sh
    - name: Test
      run: make test
    - name: Build
      run: make all

  test-macos:
    name: Test on MacOS
    runs-on: macos-latest
    if: |
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
      (github.event.action == 'labeled' && github.event.label.name == 'dev-release')
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required to be able to generate prerelease tags
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Test
      run: make test

  build:
    name: Build and Upload
    runs-on: ubuntu-latest
    # Upload artifacts on: main pushes, releases, and PRs labeled `dev-release`
    # (internal PRs only — fork PRs are blocked to keep secrets out of reach).
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'release' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          (github.event.action == 'labeled' && github.event.label.name == 'dev-release') ||
          (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'dev-release'))
        )
      )
    needs: test
    outputs:
      pr_urls: ${{ steps.pr_urls.outputs.urls }}
      version: ${{ steps.version.outputs.value }}
    env:
      # Empty on non-PR events; dev-version.sh consumes these to stamp PR
      # builds as v<next>-pr.<pr-num>.<head-sha>. PR_HEAD_SHA is the branch
      # HEAD (not the synthetic merge-commit SHA GitHub checks out for
      # pull_request events).
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required to be able to generate prerelease tags
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Compute version
      id: version
      run: echo "value=$(./dev-version.sh)" >> "$GITHUB_OUTPUT"
    - name: Build
      run: make all manifest
    - uses: actions/upload-artifact@v4
      with:
        name: viam-agent-windows
        path: bin/viam-agent-*-windows-x86_64
    - uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}
    - uses: google-github-actions/setup-gcloud@v2
    - name: Upload binaries to GCS (Release)
      if: github.event_name == 'release'
      run: |
        gsutil -h "Cache-Control:no-cache" cp bin/viam-agent-* install.sh uninstall.sh preinstall.sh gs://packages.viam.com/apps/viam-agent/
        gsutil cp etc/viam-agent-*.json gs://packages.viam.com/apps/viam-subsystems/
    - name: Upload binaries to GCS (Prerelease)
      if: github.event_name != 'release' && github.event_name != 'pull_request'
      run: |
        gsutil -h "Cache-Control:no-cache" cp bin/viam-agent-* gs://packages.viam.com/apps/viam-agent/prerelease/
        gsutil cp etc/viam-agent-*.json gs://packages.viam.com/apps/viam-subsystems/
    - name: Upload binaries to GCS (PR dev release)
      if: github.event_name == 'pull_request'
      run: |
        PR_PATH="gs://packages.viam.com/apps/viam-agent/prerelease/pr-${{ github.event.pull_request.number }}"
        gsutil -h "Cache-Control:no-cache" cp bin/viam-agent-* "$PR_PATH/"
        gsutil cp etc/viam-agent-*.json "$PR_PATH/"
    - name: Collect PR dev release URLs
      id: pr_urls
      if: github.event_name == 'pull_request'
      run: |
        BASE="https://storage.googleapis.com/packages.viam.com/apps/viam-agent/prerelease/pr-${{ github.event.pull_request.number }}"
        {
          echo "urls<<EOF"
          for f in bin/viam-agent-*; do
            name=$(basename "$f")
            echo "- [\`${name}\`](${BASE}/${name})"
          done
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

  msi:
    name: Build MSI
    runs-on: windows-2022
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: viam-agent-windows
        path: msi
    - name: Build MSI
      shell: bash
      run: |
        mv msi/viam-agent-*-windows-x86_64 msi/viam-agent-from-installer.exe
        dotnet tool restore
        dotnet build msi -c Release
        mv msi/bin/x64/Release/Package.msi "viam-agent-${{ needs.build.outputs.version }}-windows-x86_64.msi"
    - uses: actions/upload-artifact@v4
      with:
        name: viam-agent-msi
        path: viam-agent-*-windows-x86_64.msi
    - uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}
    - uses: google-github-actions/setup-gcloud@v2
    - name: Upload MSI to GCS (Release)
      if: github.event_name == 'release'
      shell: bash
      run: |
        cp viam-agent-*-windows-x86_64.msi viam-agent-stable-windows-x86_64.msi
        gsutil -h "Cache-Control:no-cache" cp viam-agent-*-windows-x86_64.msi gs://packages.viam.com/apps/viam-agent/
    - name: Upload MSI to GCS (Prerelease)
      if: github.event_name != 'release' && github.event_name != 'pull_request'
      shell: bash
      run: gsutil -h "Cache-Control:no-cache" cp viam-agent-*-windows-x86_64.msi gs://packages.viam.com/apps/viam-agent/prerelease/
    - name: Upload MSI to GCS (PR dev release)
      if: github.event_name == 'pull_request'
      shell: bash
      run: gsutil -h "Cache-Control:no-cache" cp viam-agent-*-windows-x86_64.msi "gs://packages.viam.com/apps/viam-agent/prerelease/pr-${{ github.event.pull_request.number }}/"

  pr-dev-release-comment:
    name: Post PR dev release URLs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
    - name: Post or update sticky PR comment
      # marocchino/sticky-pull-request-comment@v3.0.4
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
      with:
        header: dev-release-urls
        message: |
          ## Dev release artifacts

          Built from `${{ github.event.pull_request.head.sha }}`.

          ${{ needs.build.outputs.pr_urls }}

          Remove the `dev-release` label to stop further dev release builds.
